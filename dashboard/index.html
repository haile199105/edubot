<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EduBot Dashboard - Haileyesus</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: system-ui, -apple-system, 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%);
            min-height: 100vh;
            color: #f1f5f9;
        }
        .container { max-width: 1400px; margin: 0 auto; padding: 20px; }
        
        .header {
            background: linear-gradient(135deg, #6366f1, #4f46e5);
            padding: 30px;
            border-radius: 24px;
            margin-bottom: 30px;
            text-align: center;
        }
        .header h1 { font-size: 2rem; margin-bottom: 10px; }
        .header p { opacity: 0.9; }
        
        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        .stat-card {
            background: rgba(30, 41, 59, 0.9);
            backdrop-filter: blur(10px);
            padding: 20px;
            border-radius: 20px;
            border: 1px solid #334155;
        }
        .stat-card h3 { font-size: 0.8rem; color: #94a3b8; margin-bottom: 8px; text-transform: uppercase; }
        .stat-card .value { font-size: 2rem; font-weight: bold; color: #6366f1; }
        
        .nav {
            display: flex;
            gap: 10px;
            margin-bottom: 25px;
            flex-wrap: wrap;
        }
        .nav-btn {
            background: #1e293b;
            border: 1px solid #334155;
            color: #94a3b8;
            padding: 10px 20px;
            border-radius: 40px;
            cursor: pointer;
            font-size: 0.9rem;
            transition: all 0.2s;
        }
        .nav-btn.active {
            background: #6366f1;
            color: white;
            border-color: #6366f1;
        }
        .nav-btn:hover { background: #334155; color: white; }
        
        .card {
            background: #1e293b;
            border-radius: 20px;
            padding: 25px;
            margin-bottom: 25px;
            border: 1px solid #334155;
        }
        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            flex-wrap: wrap;
            gap: 15px;
        }
        .card-header h2 { font-size: 1.3rem; }
        
        table {
            width: 100%;
            border-collapse: collapse;
        }
        th, td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid #334155;
        }
        th { color: #94a3b8; font-weight: 500; font-size: 0.8rem; text-transform: uppercase; }
        td { font-size: 0.9rem; }
        
        button {
            background: #6366f1;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 10px;
            cursor: pointer;
            font-size: 0.85rem;
            transition: all 0.2s;
        }
        button:hover { background: #4f46e5; transform: scale(0.98); }
        .btn-small { padding: 4px 10px; font-size: 0.75rem; margin: 0 2px; }
        .btn-danger { background: #ef4444; }
        .btn-danger:hover { background: #dc2626; }
        
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        .modal-content {
            background: #1e293b;
            padding: 30px;
            border-radius: 20px;
            max-width: 500px;
            width: 90%;
            border: 1px solid #334155;
        }
        .modal-content h3 { margin-bottom: 20px; }
        .modal-content input, .modal-content textarea, .modal-content select {
            width: 100%;
            padding: 10px;
            margin-bottom: 15px;
            background: #0f172a;
            border: 1px solid #334155;
            border-radius: 10px;
            color: white;
            font-family: inherit;
        }
        .modal-content textarea { min-height: 100px; resize: vertical; }
        
        .badge {
            display: inline-block;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 0.7rem;
            font-weight: 500;
        }
        .badge-success { background: #22c55e20; color: #22c55e; }
        .badge-warning { background: #f59e0b20; color: #f59e0b; }
        
        .empty { text-align: center; padding: 40px; color: #64748b; }
        
        @media (max-width: 768px) {
            .stats { grid-template-columns: repeat(2, 1fr); }
            th, td { font-size: 0.75rem; padding: 8px; }
            .card-header { flex-direction: column; align-items: stretch; }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1>🎓 EduBot Dashboard</h1>
        <p>Welcome, Haileyesus! Manage your AI learning assistant</p>
        <p style="font-size: 0.8rem; margin-top: 10px;">
            🤖 Bot: Running on Railway | 📊 Dashboard: Vercel | 💾 Data: Supabase
        </p>
    </div>
    
    <div class="nav">
        <button class="nav-btn active" onclick="showPage('analytics')">📊 Analytics</button>
        <button class="nav-btn" onclick="showPage('notes')">📝 Daily Notes</button>
        <button class="nav-btn" onclick="showPage('questions')">❓ Questions</button>
        <button class="nav-btn" onclick="showPage('books')">📚 Books</button>
        <button class="nav-btn" onclick="showPage('students')">👨‍🎓 Students</button>
    </div>
    
    <div id="analytics" class="page">
        <div class="stats" id="stats"></div>
        <div class="card">
            <div class="card-header">
                <h2>📈 Recent Student Activity</h2>
                <button onclick="loadAnalytics()">🔄 Refresh</button>
            </div>
            <div id="activity"></div>
        </div>
    </div>
    
    <div id="notes" class="page" style="display:none">
        <div class="card">
            <div class="card-header">
                <h2>📝 Daily Notes</h2>
                <button onclick="openNoteModal()">+ Add New Note</button>
            </div>
            <div id="notes-table"></div>
        </div>
    </div>
    
    <div id="questions" class="page" style="display:none">
        <div class="card">
            <div class="card-header">
                <h2>❓ Practice Questions</h2>
                <button onclick="openQuestionModal()">+ Add Question</button>
            </div>
            <div id="questions-table"></div>
        </div>
    </div>
    
    <div id="books" class="page" style="display:none">
        <div class="card">
            <div class="card-header">
                <h2>📚 Books Library</h2>
                <button onclick="openBookModal()">+ Add Book</button>
            </div>
            <div id="books-table"></div>
        </div>
    </div>
    
    <div id="students" class="page" style="display:none">
        <div class="card">
            <h2>👨‍🎓 Registered Students</h2>
            <div id="students-table"></div>
        </div>
    </div>
</div>

<!-- Modals -->
<div id="noteModal" class="modal">
    <div class="modal-content">
        <h3>📝 Add Daily Note</h3>
        <input type="text" id="noteTitle" placeholder="Title">
        <input type="text" id="noteSubject" placeholder="Subject (e.g., Math, Science)">
        <input type="date" id="noteDate">
        <textarea id="noteContent" placeholder="Write your note content here..."></textarea>
        <select id="notePublished">
            <option value="true">✅ Published</option>
            <option value="false">🔒 Draft</option>
        </select>
        <button onclick="saveNote()">Save Note</button>
        <button onclick="closeModal('noteModal')" style="background:#334155">Cancel</button>
    </div>
</div>

<div id="questionModal" class="modal">
    <div class="modal-content">
        <h3>❓ Add Question</h3>
        <textarea id="questionText" placeholder="Enter your question..."></textarea>
        <textarea id="questionAnswer" placeholder="Enter the answer..."></textarea>
        <input type="text" id="questionSubject" placeholder="Subject">
        <select id="questionDifficulty">
            <option value="easy">🟢 Easy</option>
            <option value="medium" selected>🟡 Medium</option>
            <option value="hard">🔴 Hard</option>
        </select>
        <textarea id="questionExplanation" placeholder="Explanation (optional)"></textarea>
        <button onclick="saveQuestion()">Save Question</button>
        <button onclick="closeModal('questionModal')" style="background:#334155">Cancel</button>
    </div>
</div>

<div id="bookModal" class="modal">
    <div class="modal-content">
        <h3>📚 Add Book</h3>
        <input type="text" id="bookTitle" placeholder="Book Title">
        <input type="text" id="bookAuthor" placeholder="Author">
        <input type="text" id="bookSubject" placeholder="Subject">
        <textarea id="bookDescription" placeholder="Description"></textarea>
        <input type="url" id="bookFileUrl" placeholder="File URL (Google Drive link)">
        <button onclick="saveBook()">Save Book</button>
        <button onclick="closeModal('bookModal')" style="background:#334155">Cancel</button>
    </div>
</div>

<script>
// ============================================
// YOUR SUPABASE CREDENTIALS - FILLED
// ============================================
const SUPABASE_URL = "https://zecfvwgozgljqpmxfliv.supabase.co";
const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InplY2Z2d2dvemdsanFwbXhmbGl2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ4NDU4NjUsImV4cCI6MjA5MDQyMTg2NX0.x4IxAt2lBTXsAT6pBZJyW_NL9hvzf3rUG-9EhziK7dE";
const TEACHER_ID = "9eb32f57-8d2b-436e-91c8-e1cd0ad9ba89";

async function api(path, options = {}) {
    const url = `${SUPABASE_URL}/rest/v1/${path}`;
    const res = await fetch(url, {
        headers: {
            "apikey": SUPABASE_KEY,
            "Authorization": `Bearer ${SUPABASE_KEY}`,
            "Content-Type": "application/json"
        },
        ...options
    });
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    if (options.method === "DELETE") return null;
    return res.json();
}

async function loadAnalytics() {
    try {
        const [students, notes, questions, books, activity] = await Promise.all([
            api(`students?teacher_id=eq.${TEACHER_ID}&select=id`),
            api(`daily_notes?teacher_id=eq.${TEACHER_ID}&select=id`),
            api(`questions?teacher_id=eq.${TEACHER_ID}&select=id`),
            api(`books?teacher_id=eq.${TEACHER_ID}&select=id`),
            api(`activity_log?teacher_id=eq.${TEACHER_ID}&order=created_at.desc&limit=10&select=action,created_at,students(first_name)`)
        ]);
        
        document.getElementById('stats').innerHTML = `
            <div class="stat-card"><h3>Total Students</h3><div class="value">${students.length}</div></div>
            <div class="stat-card"><h3>Total Notes</h3><div class="value">${notes.length}</div></div>
            <div class="stat-card"><h3>Questions</h3><div class="value">${questions.length}</div></div>
            <div class="stat-card"><h3>Books</h3><div class="value">${books.length}</div></div>
        `;
        
        if (activity.length) {
            document.getElementById('activity').innerHTML = `
                <table>
                    <thead><tr><th>Student</th><th>Action</th><th>Time</th></tr></thead>
                    <tbody>
                        ${activity.map(a => `
                            <tr>
                                <td>${a.students?.first_name || 'Anonymous'}</td>
                                <td>${a.action}</td>
                                <td>${new Date(a.created_at).toLocaleString()}</td>
                            </tr>
                        `).join('')}
                    </tbody>
                </table>
            `;
        } else {
            document.getElementById('activity').innerHTML = '<div class="empty">📭 No activity yet</div>';
        }
    } catch(e) {
        console.error(e);
        document.getElementById('stats').innerHTML = '<div class="empty">Error loading stats</div>';
    }
}

async function loadNotes() {
    try {
        const notes = await api(`daily_notes?teacher_id=eq.${TEACHER_ID}&order=note_date.desc`);
        if (notes.length) {
            document.getElementById('notes-table').innerHTML = `
                <table>
                    <thead><tr><th>Date</th><th>Title</th><th>Subject</th><th>Status</th><th>Actions</th></tr></thead>
                    <tbody>
                        ${notes.map(n => `
                            <tr>
                                <td>${n.note_date}</td>
                                <td><strong>${n.title}</strong></td>
                                <td>${n.subject || '-'}</td>
                                <td><span class="badge ${n.is_published ? 'badge-success' : 'badge-warning'}">${n.is_published ? 'Published' : 'Draft'}</span></td>
                                <td><button class="btn-small" onclick="deleteNote('${n.id}')">🗑 Delete</button></td>
                            </tr>
                        `).join('')}
                    </tbody>
                </table>
            `;
        } else {
            document.getElementById('notes-table').innerHTML = '<div class="empty">📭 No notes yet. Add your first note!</div>';
        }
    } catch(e) {
        document.getElementById('notes-table').innerHTML = '<div class="empty">Error loading notes</div>';
    }
}

async function loadQuestions() {
    try {
        const questions = await api(`questions?teacher_id=eq.${TEACHER_ID}&order=created_at.desc`);
        if (questions.length) {
            document.getElementById('questions-table').innerHTML = `
                <table>
                    <thead><tr><th>Question</th><th>Subject</th><th>Difficulty</th><th>Actions</th></tr></thead>
                    <tbody>
                        ${questions.map(q => `
                            <tr>
                                <td>${q.question_text.substring(0, 60)}...</td>
                                <td>${q.subject || '-'}</td>
                                <td>${q.difficulty || 'medium'}</td>
                                <td><button class="btn-small" onclick="deleteQuestion('${q.id}')">🗑 Delete</button></td>
                            </tr>
                        `).join('')}
                    </tbody>
                </table>
            `;
        } else {
            document.getElementById('questions-table').innerHTML = '<div class="empty">❓ No questions yet. Add your first question!</div>';
        }
    } catch(e) {
        document.getElementById('questions-table').innerHTML = '<div class="empty">Error loading questions</div>';
    }
}

async function loadBooks() {
    try {
        const books = await api(`books?teacher_id=eq.${TEACHER_ID}`);
        if (books.length) {
            document.getElementById('books-table').innerHTML = `
                <table>
                    <thead><tr><th>Title</th><th>Author</th><th>Subject</th><th>Link</th><th>Actions</th></tr></thead>
                    <tbody>
                        ${books.map(b => `
                            <tr>
                                <td><strong>${b.title}</strong></td>
                                <td>${b.author || '-'}</td>
                                <td>${b.subject || '-'}</td>
                                <td>${b.file_url ? '<a href="'+b.file_url+'" target="_blank" style="color:#6366f1">🔗 Link</a>' : '-'}</td>
                                <td><button class="btn-small" onclick="deleteBook('${b.id}')">🗑 Delete</button></td>
                            </tr>
                        `).join('')}
                    </tbody>
                </table>
            `;
        } else {
            document.getElementById('books-table').innerHTML = '<div class="empty">📚 No books yet. Add your first book!</div>';
        }
    } catch(e) {
        document.getElementById('books-table').innerHTML = '<div class="empty">Error loading books</div>';
    }
}

async function loadStudents() {
    try {
        const students = await api(`students?teacher_id=eq.${TEACHER_ID}&order=joined_at.desc`);
        if (students.length) {
            document.getElementById('students-table').innerHTML = `
                <table>
                    <thead><tr><th>Name</th><th>Username</th><th>Telegram ID</th><th>Joined</th></tr></thead>
                    <tbody>
                        ${students.map(s => `
                            <tr>
                                <td>${s.first_name || 'Anonymous'}</td>
                                <td>@${s.username || '-'}</td>
                                <td>${s.telegram_id}</td>
                                <td>${new Date(s.joined_at).toLocaleDateString()}</td>
                            </tr>
                        `).join('')}
                    </tbody>
                </table>
            `;
        } else {
            document.getElementById('students-table').innerHTML = '<div class="empty">👨‍🎓 No students yet</div>';
        }
    } catch(e) {
        document.getElementById('students-table').innerHTML = '<div class="empty">Error loading students</div>';
    }
}

async function saveNote() {
    const data = {
        teacher_id: TEACHER_ID,
        title: document.getElementById('noteTitle').value,
        subject: document.getElementById('noteSubject').value,
        note_date: document.getElementById('noteDate').value,
        content: document.getElementById('noteContent').value,
        is_published: document.getElementById('notePublished').value === 'true'
    };
    if (!data.title || !data.content) {
        alert('Title and content are required');
        return;
    }
    await api('daily_notes', { method: 'POST', body: JSON.stringify(data) });
    closeModal('noteModal');
    loadNotes();
}

async function saveQuestion() {
    const data = {
        teacher_id: TEACHER_ID,
        question_text: document.getElementById('questionText').value,
        answer: document.getElementById('questionAnswer').value,
        subject: document.getElementById('questionSubject').value,
        difficulty: document.getElementById('questionDifficulty').value,
        explanation: document.getElementById('questionExplanation').value,
        is_active: true
    };
    if (!data.question_text || !data.answer) {
        alert('Question and answer are required');
        return;
    }
    await api('questions', { method: 'POST', body: JSON.stringify(data) });
    closeModal('questionModal');
    loadQuestions();
}

async function saveBook() {
    const data = {
        teacher_id: TEACHER_ID,
        title: document.getElementById('bookTitle').value,
        author: document.getElementById('bookAuthor').value,
        subject: document.getElementById('bookSubject').value,
        description: document.getElementById('bookDescription').value,
        file_url: document.getElementById('bookFileUrl').value,
        is_active: true
    };
    if (!data.title) {
        alert('Title is required');
        return;
    }
    await api('books', { method: 'POST', body: JSON.stringify(data) });
    closeModal('bookModal');
    loadBooks();
}

async function deleteNote(id) {
    if (!confirm('Delete this note?')) return;
    await api(`daily_notes?id=eq.${id}`, { method: 'DELETE' });
    loadNotes();
}

async function deleteQuestion(id) {
    if (!confirm('Delete this question?')) return;
    await api(`questions?id=eq.${id}`, { method: 'DELETE' });
    loadQuestions();
}

async function deleteBook(id) {
    if (!confirm('Delete this book?')) return;
    await api(`books?id=eq.${id}`, { method: 'DELETE' });
    loadBooks();
}

function showPage(page) {
    document.querySelectorAll('.page').forEach(p => p.style.display = 'none');
    document.getElementById(page).style.display = 'block';
    document.querySelectorAll('.nav-btn').forEach(btn => btn.classList.remove('active'));
    event.target.classList.add('active');
    
    if (page === 'analytics') loadAnalytics();
    if (page === 'notes') loadNotes();
    if (page === 'questions') loadQuestions();
    if (page === 'books') loadBooks();
    if (page === 'students') loadStudents();
}

function openNoteModal() { document.getElementById('noteModal').style.display = 'flex'; }
function openQuestionModal() { document.getElementById('questionModal').style.display = 'flex'; }
function openBookModal() { document.getElementById('bookModal').style.display = 'flex'; }
function closeModal(id) { document.getElementById(id).style.display = 'none'; }

loadAnalytics();
</script>
</body>
</html>
