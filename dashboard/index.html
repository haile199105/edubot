<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EduBot Dashboard</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: system-ui, -apple-system, sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%);
            min-height: 100vh;
            color: #f1f5f9;
            padding: 20px;
        }
        .container { max-width: 1400px; margin: 0 auto; }
        .header {
            background: linear-gradient(135deg, #6366f1, #4f46e5);
            padding: 30px;
            border-radius: 24px;
            margin-bottom: 30px;
            text-align: center;
        }
        .status {
            display: inline-block;
            padding: 5px 15px;
            border-radius: 20px;
            margin-top: 10px;
        }
        .status-connected { background: #22c55e20; color: #22c55e; }
        .status-error { background: #ef444420; color: #ef4444; }
        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        .stat-card {
            background: #1e293b;
            padding: 20px;
            border-radius: 20px;
            border: 1px solid #334155;
            text-align: center;
        }
        .stat-card .value { font-size: 2rem; font-weight: bold; color: #6366f1; }
        .nav {
            display: flex;
            gap: 10px;
            margin-bottom: 25px;
            flex-wrap: wrap;
            border-bottom: 1px solid #334155;
            padding-bottom: 15px;
        }
        .nav-btn {
            background: #1e293b;
            border: 1px solid #334155;
            color: #94a3b8;
            padding: 10px 20px;
            border-radius: 40px;
            cursor: pointer;
        }
        .nav-btn.active {
            background: #6366f1;
            color: white;
        }
        .card {
            background: #1e293b;
            border-radius: 20px;
            padding: 25px;
            margin-bottom: 25px;
            border: 1px solid #334155;
        }
        .card-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 20px;
            flex-wrap: wrap;
            gap: 15px;
        }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #334155; }
        th { color: #94a3b8; }
        button {
            background: #6366f1;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 10px;
            cursor: pointer;
        }
        .btn-small { padding: 4px 10px; font-size: 0.75rem; }
        .btn-danger { background: #ef4444; }
        input, textarea {
            width: 100%;
            padding: 10px;
            margin-bottom: 15px;
            background: #0f172a;
            border: 1px solid #334155;
            border-radius: 10px;
            color: white;
        }
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        .modal-content {
            background: #1e293b;
            padding: 30px;
            border-radius: 20px;
            max-width: 500px;
            width: 90%;
        }
        .empty { text-align: center; padding: 40px; color: #64748b; }
        .toast {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: #1e293b;
            border-left: 4px solid #22c55e;
            padding: 12px 20px;
            border-radius: 10px;
            display: none;
        }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1>🎓 EduBot Dashboard</h1>
        <p>Manage your AI learning assistant</p>
        <div id="connectionStatus" class="status status-error">Checking connection...</div>
    </div>
    
    <div class="nav">
        <button class="nav-btn active" onclick="showPage('analytics')">📊 Analytics</button>
        <button class="nav-btn" onclick="showPage('notes')">📝 Notes</button>
        <button class="nav-btn" onclick="showPage('questions')">❓ Questions</button>
        <button class="nav-btn" onclick="showPage('books')">📚 Books</button>
        <button class="nav-btn" onclick="showPage('students')">👨‍🎓 Students</button>
    </div>
    
    <div id="analytics" class="page">
        <div class="stats" id="stats"></div>
    </div>
    
    <div id="notes" class="page" style="display:none">
        <div class="card">
            <div class="card-header">
                <h2>📝 Daily Notes</h2>
                <button onclick="openNoteModal()">+ Add Note</button>
            </div>
            <div id="notesTable"></div>
        </div>
    </div>
    
    <div id="questions" class="page" style="display:none">
        <div class="card">
            <div class="card-header">
                <h2>❓ Questions</h2>
                <button onclick="openQuestionModal()">+ Add Question</button>
            </div>
            <div id="questionsTable"></div>
        </div>
    </div>
    
    <div id="books" class="page" style="display:none">
        <div class="card">
            <div class="card-header">
                <h2>📚 Books</h2>
                <button onclick="openBookModal()">+ Add Book</button>
            </div>
            <div id="booksTable"></div>
        </div>
    </div>
    
    <div id="students" class="page" style="display:none">
        <div class="card">
            <h2>👨‍🎓 Students</h2>
            <div id="studentsTable"></div>
        </div>
    </div>
</div>

<!-- Modals -->
<div id="noteModal" class="modal">
    <div class="modal-content">
        <h3>Add Note</h3>
        <input type="text" id="noteTitle" placeholder="Title">
        <input type="date" id="noteDate">
        <textarea id="noteContent" rows="5" placeholder="Content..."></textarea>
        <button onclick="saveNote()">Save</button>
        <button onclick="closeModal('noteModal')">Cancel</button>
    </div>
</div>

<div id="questionModal" class="modal">
    <div class="modal-content">
        <h3>Add Question</h3>
        <textarea id="questionText" rows="3" placeholder="Question..."></textarea>
        <textarea id="questionAnswer" rows="3" placeholder="Answer..."></textarea>
        <button onclick="saveQuestion()">Save</button>
        <button onclick="closeModal('questionModal')">Cancel</button>
    </div>
</div>

<div id="bookModal" class="modal">
    <div class="modal-content">
        <h3>Add Book</h3>
        <input type="text" id="bookTitle" placeholder="Title">
        <input type="text" id="bookAuthor" placeholder="Author (optional)">
        <button onclick="saveBook()">Save</button>
        <button onclick="closeModal('bookModal')">Cancel</button>
    </div>
</div>

<div id="toast" class="toast"></div>

<script>
const SUPABASE_URL = "https://zecfvwgozgljqpmxfliv.supabase.co";
const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InplY2Z2d2dvemdsanFwbXhmbGl2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ4NDU4NjUsImV4cCI6MjA5MDQyMTg2NX0.x4IxAt2lBTXsAT6pBZJyW_NL9hvzf3rUG-9EhziK7dE";
const TEACHER_ID = "9eb32f57-8d2b-436e-91c8-e1cd0ad9ba89";

function showToast(msg) {
    const toast = document.getElementById('toast');
    toast.textContent = msg;
    toast.style.display = 'block';
    setTimeout(() => toast.style.display = 'none', 3000);
}

async function api(table, options = {}) {
    let url = `${SUPABASE_URL}/rest/v1/${table}`;
    if (options.filter) url += `?${options.filter.column}=eq.${options.filter.value}`;
    if (options.order) url += `${url.includes('?') ? '&' : '?'}order=${options.order.column}.desc`;
    
    const res = await fetch(url, {
        headers: { "apikey": SUPABASE_KEY, "Authorization": `Bearer ${SUPABASE_KEY}`, "Content-Type": "application/json" },
        method: options.method || 'GET',
        body: options.data ? JSON.stringify(options.data) : undefined
    });
    if (!res.ok && res.status !== 204) throw new Error(await res.text());
    if (res.status === 204) return [];
    return res.json();
}

async function testConnection() {
    try {
        const result = await api('teachers', { filter: { column: 'id', value: TEACHER_ID } });
        if (result && result.length > 0) {
            document.getElementById('connectionStatus').innerHTML = '✅ Connected to Supabase';
            document.getElementById('connectionStatus').className = 'status status-connected';
            return true;
        } else {
            document.getElementById('connectionStatus').innerHTML = '⚠️ Teacher not found';
            return false;
        }
    } catch(e) {
        document.getElementById('connectionStatus').innerHTML = `❌ Error: ${e.message}`;
        return false;
    }
}

async function loadAll() {
    await loadStats();
    await loadNotes();
    await loadQuestions();
    await loadBooks();
    await loadStudents();
}

async function loadStats() {
    const [students, notes, questions, books] = await Promise.all([
        api('students', { filter: { column: 'teacher_id', value: TEACHER_ID } }),
        api('daily_notes', { filter: { column: 'teacher_id', value: TEACHER_ID } }),
        api('questions', { filter: { column: 'teacher_id', value: TEACHER_ID } }),
        api('books', { filter: { column: 'teacher_id', value: TEACHER_ID } })
    ]);
    document.getElementById('stats').innerHTML = `
        <div class="stat-card"><h3>Students</h3><div class="value">${students?.length || 0}</div></div>
        <div class="stat-card"><h3>Notes</h3><div class="value">${notes?.length || 0}</div></div>
        <div class="stat-card"><h3>Questions</h3><div class="value">${questions?.length || 0}</div></div>
        <div class="stat-card"><h3>Books</h3><div class="value">${books?.length || 0}</div></div>
    `;
}

async function loadNotes() {
    const notes = await api('daily_notes', { filter: { column: 'teacher_id', value: TEACHER_ID }, order: { column: 'note_date' } });
    if (notes?.length) {
        document.getElementById('notesTable').innerHTML = `
            <thead> <th>Date</th><th>Title</th><th>Actions</th> </thead>
            <tbody>${notes.map(n => `
                <tr><td>${n.note_date}</td><td><strong>${escapeHtml(n.title)}</strong><br><small>${escapeHtml(n.content.substring(0, 80))}...</small></td>
                <td><button class="btn-small btn-danger" onclick="deleteNote('${n.id}')">Delete</button></td></tr>
            `).join('')}</tbody>
        `;
    } else {
        document.getElementById('notesTable').innerHTML = '<div class="empty">📭 No notes yet</div>';
    }
}

async function loadQuestions() {
    const questions = await api('questions', { filter: { column: 'teacher_id', value: TEACHER_ID } });
    if (questions?.length) {
        document.getElementById('questionsTable').innerHTML = `
            <thead><th>Question</th><th>Answer</th><th>Actions</th></thead>
            <tbody>${questions.map(q => `
                <tr><td>${escapeHtml(q.question_text.substring(0, 60))}...</td>
                <td>${escapeHtml(q.answer.substring(0, 40))}...</td>
                <td><button class="btn-small btn-danger" onclick="deleteQuestion('${q.id}')">Delete</button></td></tr>
            `).join('')}</tbody>
        `;
    } else {
        document.getElementById('questionsTable').innerHTML = '<div class="empty">❓ No questions yet</div>';
    }
}

async function loadBooks() {
    const books = await api('books', { filter: { column: 'teacher_id', value: TEACHER_ID } });
    if (books?.length) {
        document.getElementById('booksTable').innerHTML = `
            <thead><th>Title</th><th>Author</th><th>Actions</th></thead>
            <tbody>${books.map(b => `
                <tr><td><strong>${escapeHtml(b.title)}</strong></td>
                <td>${escapeHtml(b.author || '-')}</td>
                <td><button class="btn-small btn-danger" onclick="deleteBook('${b.id}')">Delete</button></td></tr>
            `).join('')}</tbody>
        `;
    } else {
        document.getElementById('booksTable').innerHTML = '<div class="empty">📚 No books yet</div>';
    }
}

async function loadStudents() {
    const students = await api('students', { filter: { column: 'teacher_id', value: TEACHER_ID } });
    if (students?.length) {
        document.getElementById('studentsTable').innerHTML = `
            <thead><th>Name</th><th>Username</th><th>Telegram ID</th><th>Joined</th></thead>
            <tbody>${students.map(s => `
                <tr><td>${escapeHtml(s.first_name || 'Anonymous')}</td>
                <td>@${escapeHtml(s.username || '-')}</td>
                <td>${s.telegram_id}</td>
                <td>${new Date(s.joined_at).toLocaleDateString()}</td></tr>
            `).join('')}</tbody>
        `;
    } else {
        document.getElementById('studentsTable').innerHTML = '<div class="empty">👨‍🎓 No students yet</div>';
    }
}

async function saveNote() {
    const data = { teacher_id: TEACHER_ID, title: document.getElementById('noteTitle').value, content: document.getElementById('noteContent').value, note_date: document.getElementById('noteDate').value || new Date().toISOString().split('T')[0] };
    if (!data.title || !data.content) { showToast('Title and content required'); return; }
    await api('daily_notes', { method: 'POST', data });
    closeModal('noteModal');
    await loadAll();
    showToast('Note added!');
}

async function saveQuestion() {
    const data = { teacher_id: TEACHER_ID, question_text: document.getElementById('questionText').value, answer: document.getElementById('questionAnswer').value };
    if (!data.question_text || !data.answer) { showToast('Question and answer required'); return; }
    await api('questions', { method: 'POST', data });
    closeModal('questionModal');
    await loadAll();
    showToast('Question added!');
}

async function saveBook() {
    const data = { teacher_id: TEACHER_ID, title: document.getElementById('bookTitle').value, author: document.getElementById('bookAuthor').value || null };
    if (!data.title) { showToast('Title required'); return; }
    await api('books', { method: 'POST', data });
    closeModal('bookModal');
    await loadAll();
    showToast('Book added!');
}

async function deleteNote(id) { if (confirm('Delete?')) { await api(`daily_notes?id=eq.${id}`, { method: 'DELETE' }); await loadAll(); showToast('Deleted'); } }
async function deleteQuestion(id) { if (confirm('Delete?')) { await api(`questions?id=eq.${id}`, { method: 'DELETE' }); await loadAll(); showToast('Deleted'); } }
async function deleteBook(id) { if (confirm('Delete?')) { await api(`books?id=eq.${id}`, { method: 'DELETE' }); await loadAll(); showToast('Deleted'); } }

function showPage(page) {
    document.querySelectorAll('.page').forEach(p => p.style.display = 'none');
    document.getElementById(page).style.display = 'block';
    document.querySelectorAll('.nav-btn').forEach(btn => btn.classList.remove('active'));
    event.target.classList.add('active');
}
function openNoteModal() { document.getElementById('noteDate').value = new Date().toISOString().split('T')[0]; document.getElementById('noteModal').style.display = 'flex'; }
function openQuestionModal() { document.getElementById('questionModal').style.display = 'flex'; }
function openBookModal() { document.getElementById('bookModal').style.display = 'flex'; }
function closeModal(id) { document.getElementById(id).style.display = 'none'; }
function escapeHtml(str) { if (!str) return ''; return str.replace(/[&<>]/g, m => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;' }[m])); }

testConnection().then(connected => { if (connected) loadAll(); });
</script>
</body>
</html>
