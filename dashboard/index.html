<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EduBot Dashboard</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: system-ui, -apple-system, 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%);
            min-height: 100vh;
            color: #f1f5f9;
        }
        
        /* Login Page */
        .login-container {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }
        .login-card {
            background: #1e293b;
            border-radius: 24px;
            padding: 40px;
            max-width: 400px;
            width: 100%;
            border: 1px solid #334155;
        }
        .login-card h1 {
            text-align: center;
            margin-bottom: 10px;
            font-size: 1.8rem;
        }
        .login-card p {
            text-align: center;
            color: #94a3b8;
            margin-bottom: 30px;
        }
        .login-card input {
            width: 100%;
            padding: 12px;
            margin-bottom: 15px;
            background: #0f172a;
            border: 1px solid #334155;
            border-radius: 10px;
            color: white;
            font-size: 1rem;
        }
        .login-card button {
            width: 100%;
            padding: 12px;
            background: #6366f1;
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 1rem;
            cursor: pointer;
        }
        .login-card button:hover { background: #4f46e5; }
        .error { color: #ef4444; text-align: center; margin-top: 15px; display: none; }
        
        /* Dashboard */
        .dashboard { display: none; }
        .container { max-width: 1400px; margin: 0 auto; padding: 20px; }
        .header {
            background: linear-gradient(135deg, #6366f1, #4f46e5);
            padding: 30px;
            border-radius: 24px;
            margin-bottom: 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
        }
        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        .stat-card {
            background: #1e293b;
            padding: 20px;
            border-radius: 20px;
            border: 1px solid #334155;
        }
        .stat-card .value { font-size: 2rem; font-weight: bold; color: #6366f1; }
        
        .nav {
            display: flex;
            gap: 10px;
            margin-bottom: 25px;
            flex-wrap: wrap;
            border-bottom: 1px solid #334155;
            padding-bottom: 15px;
        }
        .nav-btn {
            background: #1e293b;
            border: 1px solid #334155;
            color: #94a3b8;
            padding: 10px 20px;
            border-radius: 40px;
            cursor: pointer;
        }
        .nav-btn.active {
            background: #6366f1;
            color: white;
        }
        
        .card {
            background: #1e293b;
            border-radius: 20px;
            padding: 25px;
            margin-bottom: 25px;
            border: 1px solid #334155;
        }
        .card-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #334155; }
        th { color: #94a3b8; font-size: 0.8rem; }
        
        button {
            background: #6366f1;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 10px;
            cursor: pointer;
        }
        .btn-small { padding: 4px 10px; font-size: 0.75rem; }
        .btn-danger { background: #ef4444; }
        
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        .modal-content {
            background: #1e293b;
            padding: 30px;
            border-radius: 20px;
            max-width: 500px;
            width: 90%;
        }
        .modal-content input, .modal-content textarea {
            width: 100%;
            padding: 10px;
            margin-bottom: 15px;
            background: #0f172a;
            border: 1px solid #334155;
            border-radius: 10px;
            color: white;
        }
        
        .toast {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: #1e293b;
            border-left: 4px solid #22c55e;
            padding: 12px 20px;
            border-radius: 10px;
            z-index: 2000;
            display: none;
        }
        
        .status-badge {
            display: inline-block;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 0.7rem;
        }
        .status-connected { background: #22c55e20; color: #22c55e; }
        .status-error { background: #ef444420; color: #ef4444; }
        
        @media (max-width: 768px) {
            .stats { grid-template-columns: repeat(2, 1fr); }
            th, td { font-size: 0.7rem; padding: 8px; }
        }
    </style>
</head>
<body>

        <input type="email" id="loginEmail" placeholder="Email" value="haileyesusshibru19@gmail.com">
        <input type="password" id="loginPassword" placeholder="Password">

<!-- MAIN DASHBOARD -->

        <textarea id="questionAnswer" rows="3" placeholder="Answer..."></textarea>

<div id="toast" class="toast"></div>

<script>

let currentUser = null;

// Helper Functions
function showToast(message, type = 'success') {
    const toast = document.getElementById('toast');
    toast.textContent = message;
    toast.style.display = 'block';
    setTimeout(() => toast.style.display = 'none', 3000);
}

// Supabase API Helper
async function supabaseApi(table, options = {}) {
    let url = `${SUPABASE_URL}/rest/v1/${table}`;
    const headers = {
        "apikey": SUPABASE_KEY,
        "Authorization": `Bearer ${SUPABASE_KEY}`,
        "Content-Type": "application/json"
    };
    
    if (options.filter) {
        url += `?${options.filter.column}=eq.${options.filter.value}`;
    }
    if (options.order) {
        url += `&order=${options.order.column}.desc`;
    }
    
    const fetchOptions = { method: options.method || 'GET', headers };
    if (options.data) fetchOptions.body = JSON.stringify(options.data);
    
    const response = await fetch(url, fetchOptions);
    
    if (!response.ok && response.status !== 204) {
        const error = await response.text();
        throw new Error(error);
    }
    
    if (response.status === 204) return [];
    return response.json();
}

// Test Supabase Connection
async function testConnection() {
    try {
        const result = await supabaseApi('teachers', { filter: { column: 'id', value: TEACHER_ID } });
        if (result && result.length > 0) {
            document.getElementById('dbStatus').innerHTML = '✅ Connected to Supabase';
            document.getElementById('dbStatus').className = 'status-badge status-connected';

    }
}

// Load Data Functions
async function loadAllData() {
    await loadAnalytics();
    await loadNotes();
    await loadQuestions();
    await loadBooks();
    await loadStudents();
}

async function loadAnalytics() {
    try {
        const [students, notes, questions, books] = await Promise.all([
            supabaseApi('students', { filter: { column: 'teacher_id', value: TEACHER_ID } }),
            supabaseApi('daily_notes', { filter: { column: 'teacher_id', value: TEACHER_ID } }),
            supabaseApi('questions', { filter: { column: 'teacher_id', value: TEACHER_ID } }),
            supabaseApi('books', { filter: { column: 'teacher_id', value: TEACHER_ID } })
        ]);
        
        document.getElementById('stats').innerHTML = `
            <div class="stat-card"><h3>Students</h3><div class="value">${students?.length || 0}</div></div>
            <div class="stat-card"><h3>Notes</h3><div class="value">${notes?.length || 0}</div></div>
            <div class="stat-card"><h3>Questions</h3><div class="value">${questions?.length || 0}</div></div>
            <div class="stat-card"><h3>Books</h3><div class="value">${books?.length || 0}</div></div>
        `;
        
        document.getElementById('activityList').innerHTML = `
            <p>✅ System is ready!</p>
            <p>📝 You have ${notes?.length || 0} notes</p>
            <p>❓ You have ${questions?.length || 0} questions</p>
            <p>📚 You have ${books?.length || 0} books</p>
            <p>👨‍🎓 ${students?.length || 0} students registered</p>
        `;
    } catch (error) {
        console.error('Analytics error:', error);
        document.getElementById('stats').innerHTML = '<div class="stat-card"><h3>Error loading data</h3><div class="value">—</div></div>';
    }
}

async function loadNotes() {
    try {
        const notes = await supabaseApi('daily_notes', { 
            filter: { column: 'teacher_id', value: TEACHER_ID },
            order: { column: 'note_date' }
        });
        
        if (notes && notes.length > 0) {
            document.getElementById('notesTable').innerHTML = `
                <thead><tr><th>Date</th><th>Title</th><th>Actions</th> </thead>
                <tbody>
                    ${notes.map(n => `
                        <tr>
                            <td>${n.note_date}</td>
                            <td><strong>${escapeHtml(n.title)}</strong><br><small>${escapeHtml(n.content.substring(0, 80))}...</small></td>
                            <td><button class="btn-small btn-danger" onclick="deleteNote('${n.id}')">Delete</button></td>
                        </tr>
                    `).join('')}
                </tbody>
            `;
        } else {
            document.getElementById('notesTable').innerHTML = '<p>No notes yet. Add your first note!</p>';
        }
    } catch (error) {
        document.getElementById('notesTable').innerHTML = `<p>Error: ${error.message}</p>`;
    }
}

async function loadQuestions() {
    try {
        const questions = await supabaseApi('questions', { 
            filter: { column: 'teacher_id', value: TEACHER_ID },
            order: { column: 'created_at' }
        });
        
        if (questions && questions.length > 0) {
            document.getElementById('questionsTable').innerHTML = `
                <thead> <tr><th>Question</th><th>Answer</th><th>Actions</th></tr> </thead>
                <tbody>
                    ${questions.map(q => `
                        <tr>
                            <td>${escapeHtml(q.question_text.substring(0, 60))}...</td>
                            <td>${escapeHtml(q.answer.substring(0, 40))}...</td>
                            <td><button class="btn-small btn-danger" onclick="deleteQuestion('${q.id}')">Delete</button></td>
                        </tr>
                    `).join('')}
                </tbody>
            `;
        } else {
            document.getElementById('questionsTable').innerHTML = '<p>No questions yet. Add your first question!</p>';
        }
    } catch (error) {
        document.getElementById('questionsTable').innerHTML = `<p>Error: ${error.message}</p>`;
    }
}

async function loadBooks() {
    try {
        const books = await supabaseApi('books', { filter: { column: 'teacher_id', value: TEACHER_ID } });
        
        if (books && books.length > 0) {
            document.getElementById('booksTable').innerHTML = `
                <thead> <tr><th>Title</th><th>Author</th><th>Actions</th></tr> </thead>
                <tbody>
                    ${books.map(b => `
                        <tr>
                            <td><strong>${escapeHtml(b.title)}</strong></td>
                            <td>${escapeHtml(b.author || '-')}</td>
                            <td><button class="btn-small btn-danger" onclick="deleteBook('${b.id}')">Delete</button></td>
                        </tr>
                    `).join('')}
                </tbody>
            `;
        } else {
            document.getElementById('booksTable').innerHTML = '<p>No books yet. Add your first book!</p>';
        }
    } catch (error) {
        document.getElementById('booksTable').innerHTML = `<p>Error: ${error.message}</p>`;
    }
}

async function loadStudents() {
    try {
        const students = await supabaseApi('students', { filter: { column: 'teacher_id', value: TEACHER_ID } });
        
        if (students && students.length > 0) {
            document.getElementById('studentsTable').innerHTML = `
                <thead> <tr><th>Name</th><th>Username</th><th>Telegram ID</th><th>Joined</th></tr> </thead>
                <tbody>
                    ${students.map(s => `
                        <tr>
                            <td>${escapeHtml(s.first_name || 'Anonymous')}</td>
                            <td>@${escapeHtml(s.username || '-')}</td>
                            <td>${s.telegram_id}</td>
                            <td>${new Date(s.joined_at).toLocaleDateString()}</td>

                    `).join('')}

            `;
        } else {

        }
    } catch (error) {

    }
}

// Save Functions
async function saveNote() {
    const data = {
        teacher_id: TEACHER_ID,
        title: document.getElementById('noteTitle').value,
        content: document.getElementById('noteContent').value,
        note_date: document.getElementById('noteDate').value || new Date().toISOString().split('T')[0]

    if (!data.title || !data.content) {
        showToast('Title and content required', 'error');
        return;
    }
    
    try {
        await supabaseApi('daily_notes', { method: 'POST', data });
        closeModal('noteModal');
        loadNotes();
        loadAnalytics();
        showToast('Note added!');
        document.getElementById('noteTitle').value = '';
        document.getElementById('noteContent').value = '';
    } catch (error) {
        showToast('Error: ' + error.message, 'error');
    }
}

async function saveQuestion() {

        document.getElementById('questionText').value = '';
        document.getElementById('questionAnswer').value = '';
    } catch (error) {
        showToast('Error: ' + error.message, 'error');
    }
}

async function saveBook() {
    const data = {

    try {
        await supabaseApi('books', { method: 'POST', data });
        closeModal('bookModal');

        document.getElementById('bookAuthor').value = '';

// Delete Functions
async function deleteNote(id) {
    if (!confirm('Delete this note?')) return;
    try {
        await supabaseApi(`daily_notes?id=eq.${id}`, { method: 'DELETE' });
        loadNotes();
        loadAnalytics();
        showToast('Note deleted');
    } catch (error) {
        showToast('Error: ' + error.message, 'error');
    }
}

async function deleteQuestion(id) {
    if (!confirm('Delete this question?')) return;
    try {
        await supabaseApi(`questions?id=eq.${id}`, { method: 'DELETE' });

// UI Functions
function showPage(page) {
    document.querySelectorAll('.page').forEach(p => p.style.display = 'none');
    document.getElementById(page).style.display = 'block';
    document.querySelectorAll('.nav-btn').forEach(btn => btn.classList.remove('active'));
    event.target.classList.add('active');
}

function openNoteModal() {
    document.getElementById('noteDate').value = new Date().toISOString().split('T')[0];
    document.getElementById('noteModal').style.display = 'flex';
}

function openQuestionModal() {
    document.getElementById('questionModal').style.display = 'flex';
}

function openBookModal() {
    document.getElementById('bookModal').style.display = 'flex';
}

function closeModal(id) {
    document.getElementById(id).style.display = 'none';
}

function escapeHtml(str) {
    if (!str) return '';
    return str.replace(/[&<>]/g, function(m) {
        if (m === '&') return '&amp;';
        if (m === '<') return '&lt;';
        if (m === '>') return '&gt;';
        return m;
    });
}

// Initialize
testConnection();
