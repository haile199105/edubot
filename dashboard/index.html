<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EduBot Dashboard</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: system-ui, -apple-system, sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%);
            min-height: 100vh;
            color: #f1f5f9;
            padding: 20px;
        }
        .container { max-width: 1400px; margin: 0 auto; }
        
        /* Login Page */
        .login-container {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .login-card {
            background: #1e293b;
            border-radius: 24px;
            padding: 40px;
            max-width: 400px;
            width: 100%;
            border: 1px solid #334155;
        }
        .login-card h1 {
            text-align: center;
            margin-bottom: 10px;
            font-size: 1.8rem;
        }
        .login-card p {
            text-align: center;
            color: #94a3b8;
            margin-bottom: 30px;
        }
        .login-card input, .login-card select {
            width: 100%;
            padding: 12px;
            margin-bottom: 15px;
            background: #0f172a;
            border: 1px solid #334155;
            border-radius: 10px;
            color: white;
            font-size: 1rem;
        }
        .login-card button {
            width: 100%;
            padding: 12px;
            background: #6366f1;
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 1rem;
            cursor: pointer;
        }
        .login-card button:hover { background: #4f46e5; }
        .error-msg {
            color: #ef4444;
            text-align: center;
            margin-top: 15px;
        }
        
        /* Dashboard */
        .dashboard { display: none; }
        .header {
            background: linear-gradient(135deg, #6366f1, #4f46e5);
            padding: 30px;
            border-radius: 24px;
            margin-bottom: 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 20px;
        }
        .user-info {
            display: flex;
            align-items: center;
            gap: 15px;
        }
        .user-avatar {
            width: 50px;
            height: 50px;
            background: #1e293b;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            font-weight: bold;
        }
        .logout-btn {
            background: #ef4444;
            padding: 8px 16px;
            border-radius: 10px;
            cursor: pointer;
        }
        .badge {
            display: inline-block;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 0.7rem;
        }
        .badge-super { background: #f59e0b20; color: #f59e0b; }
        .badge-teacher { background: #6366f120; color: #6366f1; }
        
        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        .stat-card {
            background: #1e293b;
            padding: 20px;
            border-radius: 20px;
            border: 1px solid #334155;
            text-align: center;
        }
        .stat-card .value { font-size: 2rem; font-weight: bold; color: #6366f1; }
        
        .nav {
            display: flex;
            gap: 10px;
            margin-bottom: 25px;
            flex-wrap: wrap;
            border-bottom: 1px solid #334155;
            padding-bottom: 15px;
        }
        .nav-btn {
            background: #1e293b;
            border: 1px solid #334155;
            color: #94a3b8;
            padding: 10px 20px;
            border-radius: 40px;
            cursor: pointer;
        }
        .nav-btn.active {
            background: #6366f1;
            color: white;
        }
        
        .card {
            background: #1e293b;
            border-radius: 20px;
            padding: 25px;
            margin-bottom: 25px;
            border: 1px solid #334155;
        }
        .card-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 20px;
            flex-wrap: wrap;
            gap: 15px;
        }
        
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #334155; }
        th { color: #94a3b8; }
        
        button {
            background: #6366f1;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 10px;
            cursor: pointer;
        }
        .btn-small { padding: 4px 10px; font-size: 0.75rem; }
        .btn-danger { background: #ef4444; }
        
        input, textarea {
            width: 100%;
            padding: 10px;
            margin-bottom: 15px;
            background: #0f172a;
            border: 1px solid #334155;
            border-radius: 10px;
            color: white;
            font-family: inherit;
        }
        
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        .modal-content {
            background: #1e293b;
            padding: 30px;
            border-radius: 20px;
            max-width: 500px;
            width: 90%;
            max-height: 80vh;
            overflow-y: auto;
        }
        
        .empty { text-align: center; padding: 40px; color: #64748b; }
        .toast {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: #1e293b;
            border-left: 4px solid #22c55e;
            padding: 12px 20px;
            border-radius: 10px;
            display: none;
            z-index: 2000;
        }
        
        @media (max-width: 768px) {
            .stats { grid-template-columns: repeat(2, 1fr); }
            th, td { font-size: 0.7rem; padding: 8px; }
        }
    </style>
</head>
<body>

<!-- LOGIN PAGE -->
<div id="loginPage" class="login-container">
    <div class="login-card">
        <h1>🎓 EduBot</h1>
        <p>Sign in to your dashboard</p>
        <select id="role">
            <option value="teacher">👨‍🏫 Teacher</option>
            <option value="admin">👑 Super Admin</option>
        </select>
        <input type="text" id="teacherId" placeholder="Teacher ID" value="9eb32f57-8d2b-436e-91c8-e1cd0ad9ba89">
        <input type="password" id="password" placeholder="PIN / Password">
        <button onclick="login()">Sign In</button>
        <div id="loginError" class="error-msg"></div>
    </div>
</div>

<!-- DASHBOARD -->
<div id="dashboard" class="dashboard">
    <div class="container">
        <div class="header">
            <div>
                <h1>🎓 EduBot Dashboard</h1>
                <p>Manage your AI learning assistant</p>
            </div>
            <div class="user-info">
                <div class="user-avatar" id="userAvatar">H</div>
                <div>
                    <strong id="userName">Haileyesus</strong><br>
                    <span id="userRoleBadge" class="badge badge-teacher"></span>
                </div>
                <div class="logout-btn" onclick="logout()">🚪 Logout</div>
            </div>
        </div>
        
        <div class="nav">
            <button class="nav-btn active" onclick="showPage('analytics')">📊 Analytics</button>
            <button class="nav-btn" onclick="showPage('notes')">📝 Notes</button>
            <button class="nav-btn" onclick="showPage('questions')">❓ Questions</button>
            <button class="nav-btn" onclick="showPage('books')">📚 Books</button>
            <button class="nav-btn" onclick="showPage('students')">👨‍🎓 Students</button>
            <button class="nav-btn" id="adminNavBtn" style="display:none;" onclick="showPage('teachers')">👑 Teachers</button>
        </div>
        
        <div id="analytics" class="page">
            <div class="stats" id="stats"></div>
            <div class="card">
                <h3>📈 System Status</h3>
                <div id="systemStatus"></div>
            </div>
        </div>
        
        <div id="notes" class="page" style="display:none">
            <div class="card">
                <div class="card-header">
                    <h2>📝 Daily Notes</h2>
                    <button onclick="openNoteModal()">+ Add Note</button>
                </div>
                <div id="notesTable"></div>
            </div>
        </div>
        
        <div id="questions" class="page" style="display:none">
            <div class="card">
                <div class="card-header">
                    <h2>❓ Questions</h2>
                    <button onclick="openQuestionModal()">+ Add Question</button>
                </div>
                <div id="questionsTable"></div>
            </div>
        </div>
        
        <div id="books" class="page" style="display:none">
            <div class="card">
                <div class="card-header">
                    <h2>📚 Books</h2>
                    <button onclick="openBookModal()">+ Add Book</button>
                </div>
                <div id="booksTable"></div>
            </div>
        </div>
        
        <div id="students" class="page" style="display:none">
            <div class="card">
                <h2>👨‍🎓 Students</h2>
                <div id="studentsTable"></div>
            </div>
        </div>
        
        <div id="teachers" class="page" style="display:none">
            <div class="card">
                <div class="card-header">
                    <h2>👑 Teacher Management</h2>
                    <button onclick="openTeacherModal()">+ Add Teacher</button>
                </div>
                <div id="teachersTable"></div>
            </div>
        </div>
    </div>
</div>

<!-- Modals -->
<div id="noteModal" class="modal">
    <div class="modal-content">
        <h3>Add Note</h3>
        <input type="text" id="noteTitle" placeholder="Title">
        <input type="date" id="noteDate">
        <textarea id="noteContent" rows="5" placeholder="Content..."></textarea>
        <button onclick="saveNote()">Save</button>
        <button onclick="closeModal('noteModal')">Cancel</button>
    </div>
</div>

<div id="questionModal" class="modal">
    <div class="modal-content">
        <h3>Add Question</h3>
        <textarea id="questionText" rows="3" placeholder="Question..."></textarea>
        <textarea id="questionAnswer" rows="3" placeholder="Answer..."></textarea>
        <button onclick="saveQuestion()">Save</button>
        <button onclick="closeModal('questionModal')">Cancel</button>
    </div>
</div>

<div id="bookModal" class="modal">
    <div class="modal-content">
        <h3>Add Book</h3>
        <input type="text" id="bookTitle" placeholder="Title">
        <input type="text" id="bookAuthor" placeholder="Author">
        <button onclick="saveBook()">Save</button>
        <button onclick="closeModal('bookModal')">Cancel</button>
    </div>
</div>

<div id="teacherModal" class="modal">
    <div class="modal-content">
        <h3>Add Teacher</h3>
        <input type="text" id="teacherName" placeholder="Name">
        <input type="email" id="teacherEmail" placeholder="Email">
        <input type="password" id="teacherPassword" placeholder="Password">
        <select id="teacherRole">
            <option value="teacher">Teacher</option>
            <option value="super_admin">Super Admin</option>
        </select>
        <button onclick="createTeacher()">Create</button>
        <button onclick="closeModal('teacherModal')">Cancel</button>
    </div>
</div>

<div id="toast" class="toast"></div>

<script>
const SUPABASE_URL = "https://zecfvwgozgljqpmxfliv.supabase.co";
const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InplY2Z2d2dvemdsanFwbXhmbGl2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ4NDU4NjUsImV4cCI6MjA5MDQyMTg2NX0.x4IxAt2lBTXsAT6pBZJyW_NL9hvzf3rUG-9EhziK7dE";
const TEACHER_ID = "9eb32f57-8d2b-436e-91c8-e1cd0ad9ba89";
const TEACHER_PIN = "123456";
const ADMIN_PASS = "admin123";

let isSuperAdmin = false;

function showToast(msg) {
    const toast = document.getElementById('toast');
    toast.textContent = msg;
    toast.style.display = 'block';
    setTimeout(() => toast.style.display = 'none', 3000);
}

async function api(table, options = {}) {
    let url = `${SUPABASE_URL}/rest/v1/${table}`;
    if (options.filter) url += `?${options.filter.column}=eq.${options.filter.value}`;
    if (options.order) url += `${url.includes('?') ? '&' : '?'}order=${options.order.column}.desc`;
    
    const res = await fetch(url, {
        headers: { "apikey": SUPABASE_KEY, "Authorization": `Bearer ${SUPABASE_KEY}`, "Content-Type": "application/json" },
        method: options.method || 'GET',
        body: options.data ? JSON.stringify(options.data) : undefined
    });
    if (!res.ok && res.status !== 204) throw new Error(await res.text());
    if (res.status === 204) return [];
    return res.json();
}

function login() {
    const role = document.getElementById('role').value;
    const teacherId = document.getElementById('teacherId').value;
    const password = document.getElementById('password').value;
    const errorDiv = document.getElementById('loginError');
    
    if (role === 'teacher') {
        if (teacherId === TEACHER_ID && password === TEACHER_PIN) {
            isSuperAdmin = false;
            document.getElementById('userName').textContent = 'Haileyesus';
            document.getElementById('userAvatar').textContent = 'H';
            document.getElementById('userRoleBadge').innerHTML = '👨‍🏫 Teacher';
            document.getElementById('userRoleBadge').className = 'badge badge-teacher';
            document.getElementById('adminNavBtn').style.display = 'none';
            document.getElementById('loginPage').style.display = 'none';
            document.getElementById('dashboard').style.display = 'block';
            loadAllData();
            errorDiv.textContent = '';
        } else {
            errorDiv.textContent = 'Invalid Teacher ID or PIN';
        }
    } else if (role === 'admin') {
        if (password === ADMIN_PASS) {
            isSuperAdmin = true;
            document.getElementById('userName').textContent = 'Super Admin';
            document.getElementById('userAvatar').textContent = 'SA';
            document.getElementById('userRoleBadge').innerHTML = '👑 Super Admin';
            document.getElementById('userRoleBadge').className = 'badge badge-super';
            document.getElementById('adminNavBtn').style.display = 'block';
            document.getElementById('loginPage').style.display = 'none';
            document.getElementById('dashboard').style.display = 'block';
            loadAllData();
            errorDiv.textContent = '';
        } else {
            errorDiv.textContent = 'Invalid Admin Password';
        }
    }
}

function logout() {
    document.getElementById('dashboard').style.display = 'none';
    document.getElementById('loginPage').style.display = 'block';
    document.getElementById('password').value = '';
}

async function loadAllData() {
    await loadStats();
    await loadNotes();
    await loadQuestions();
    await loadBooks();
    await loadStudents();
    if (isSuperAdmin) await loadTeachers();
}

async function loadStats() {
    const [students, notes, questions, books] = await Promise.all([
        api('students', { filter: { column: 'teacher_id', value: TEACHER_ID } }),
        api('daily_notes', { filter: { column: 'teacher_id', value: TEACHER_ID } }),
        api('questions', { filter: { column: 'teacher_id', value: TEACHER_ID } }),
        api('books', { filter: { column: 'teacher_id', value: TEACHER_ID } })
    ]);
    document.getElementById('stats').innerHTML = `
        <div class="stat-card"><h3>Students</h3><div class="value">${students?.length || 0}</div></div>
        <div class="stat-card"><h3>Notes</h3><div class="value">${notes?.length || 0}</div></div>
        <div class="stat-card"><h3>Questions</h3><div class="value">${questions?.length || 0}</div></div>
        <div class="stat-card"><h3>Books</h3><div class="value">${books?.length || 0}</div></div>
    `;
    document.getElementById('systemStatus').innerHTML = `<p>✅ Bot running | 📊 Supabase connected | 👑 Role: ${isSuperAdmin ? 'Super Admin' : 'Teacher'}</p>`;
}

async function loadNotes() {
    const notes = await api('daily_notes', { filter: { column: 'teacher_id', value: TEACHER_ID }, order: { column: 'note_date' } });
    if (notes?.length) {
        document.getElementById('notesTable').innerHTML = `
            <thead><th>Date</th><th>Title</th><th>Actions</th></thead>
            <tbody>${notes.map(n => `<tr><td>${n.note_date}</td><td><strong>${escapeHtml(n.title)}</strong><br><small>${escapeHtml(n.content.substring(0, 80))}...</small></td><td><button class="btn-small btn-danger" onclick="deleteNote('${n.id}')">Delete</button></td></tr>`).join('')}</tbody>
        `;
    } else {
        document.getElementById('notesTable').innerHTML = '<div class="empty">📭 No notes yet</div>';
    }
}

async function loadQuestions() {
    const questions = await api('questions', { filter: { column: 'teacher_id', value: TEACHER_ID } });
    if (questions?.length) {
        document.getElementById('questionsTable').innerHTML = `
            <thead><th>Question</th><th>Answer</th><th>Actions</th></thead>
            <tbody>${questions.map(q => `<td><td>${escapeHtml(q.question_text.substring(0, 60))}...</td><td>${escapeHtml(q.answer.substring(0, 40))}...</td><td><button class="btn-small btn-danger" onclick="deleteQuestion('${q.id}')">Delete</button></td></tr>`).join('')}</tbody>
        `;
    } else {
        document.getElementById('questionsTable').innerHTML = '<div class="empty">❓ No questions yet</div>';
    }
}

async function loadBooks() {
    const books = await api('books', { filter: { column: 'teacher_id', value: TEACHER_ID } });
    if (books?.length) {
        document.getElementById('booksTable').innerHTML = `
            <thead><th>Title</th><th>Author</th><th>Actions</th></thead>
            <tbody>${books.map(b => `<tr><td><strong>${escapeHtml(b.title)}</strong></td><td>${escapeHtml(b.author || '-')}</td><td><button class="btn-small btn-danger" onclick="deleteBook('${b.id}')">Delete</button></td></tr>`).join('')}</tbody>
        `;
    } else {
        document.getElementById('booksTable').innerHTML = '<div class="empty">📚 No books yet</div>';
    }
}

async function loadStudents() {
    const students = await api('students', { filter: { column: 'teacher_id', value: TEACHER_ID } });
    if (students?.length) {
        document.getElementById('studentsTable').innerHTML = `
            <thead><th>Name</th><th>Username</th><th>Telegram ID</th><th>Joined</th></thead>
            <tbody>${students.map(s => `<tr><td>${escapeHtml(s.first_name || 'Anonymous')}</td><td>@${escapeHtml(s.username || '-')}</td><td>${s.telegram_id}</td><td>${new Date(s.joined_at).toLocaleDateString()}</td></tr>`).join('')}</tbody>
        `;
    } else {
        document.getElementById('studentsTable').innerHTML = '<div class="empty">👨‍🎓 No students yet</div>';
    }
}

async function loadTeachers() {
    const teachers = await api('teachers', { order: { column: 'created_at' } });
    if (teachers?.length) {
        document.getElementById('teachersTable').innerHTML = `
            <thead><th>Name</th><th>Email</th><th>Role</th><th>Actions</th></thead>
            <tbody>${teachers.map(t => `<tr><td><strong>${escapeHtml(t.name)}</strong></td><td>${escapeHtml(t.email)}</td><td><span class="${t.role === 'super_admin' ? 'badge-super' : 'badge-teacher'}">${t.role || 'teacher'}</span></td><td><button class="btn-small btn-danger" onclick="deleteTeacher('${t.id}')">Delete</button></td></tr>`).join('')}</tbody>
        `;
    }
}

// ============================================
// SAVE FUNCTIONS WITH AUTO-CLEARING FIELDS
// ============================================

async function saveNote() {
    const title = document.getElementById('noteTitle').value;
    const content = document.getElementById('noteContent').value;
    const noteDate = document.getElementById('noteDate').value || new Date().toISOString().split('T')[0];
    
    if (!title || !content) {
        showToast('Title and content required', 'error');
        return;
    }
    
    try {
        await api('daily_notes', { 
            method: 'POST', 
            data: { 
                teacher_id: TEACHER_ID, 
                title: title, 
                content: content, 
                note_date: noteDate 
            } 
        });
        
        // Clear form fields
        document.getElementById('noteTitle').value = '';
        document.getElementById('noteContent').value = '';
        document.getElementById('noteDate').value = new Date().toISOString().split('T')[0];
        
        closeModal('noteModal');
        await loadAllData();
        showToast('Note added successfully!');
    } catch (error) {
        showToast('Error: ' + error.message, 'error');
    }
}

async function saveQuestion() {
    const questionText = document.getElementById('questionText').value;
    const answer = document.getElementById('questionAnswer').value;
    
    if (!questionText || !answer) {
        showToast('Question and answer required', 'error');
        return;
    }
    
    try {
        await api('questions', { 
            method: 'POST', 
            data: { 
                teacher_id: TEACHER_ID, 
                question_text: questionText, 
                answer: answer 
            } 
        });
        
        // Clear form fields
        document.getElementById('questionText').value = '';
        document.getElementById('questionAnswer').value = '';
        
        closeModal('questionModal');
        await loadAllData();
        showToast('Question added successfully!');
    } catch (error) {
        showToast('Error: ' + error.message, 'error');
    }
}

async function saveBook() {
    const title = document.getElementById('bookTitle').value;
    const author = document.getElementById('bookAuthor').value;
    
    if (!title) {
        showToast('Title required', 'error');
        return;
    }
    
    try {
        await api('books', { 
            method: 'POST', 
            data: { 
                teacher_id: TEACHER_ID, 
                title: title, 
                author: author || null 
            } 
        });
        
        // Clear form fields
        document.getElementById('bookTitle').value = '';
        document.getElementById('bookAuthor').value = '';
        
        closeModal('bookModal');
        await loadAllData();
        showToast('Book added successfully!');
    } catch (error) {
        showToast('Error: ' + error.message, 'error');
    }
}

async function createTeacher() {
    const name = document.getElementById('teacherName').value;
    const email = document.getElementById('teacherEmail').value;
    const password = document.getElementById('teacherPassword').value;
    const role = document.getElementById('teacherRole').value;
    
    if (!name || !email || !password) {
        showToast('All fields required', 'error');
        return;
    }
    
    try {
        const newId = crypto.randomUUID ? crypto.randomUUID() : Date.now().toString();
        
        await api('teachers', { 
            method: 'POST', 
            data: { 
                id: newId, 
                email: email, 
                name: name, 
                role: role, 
                is_active: true,
                password_hash: password
            } 
        });
        
        // Clear form fields
        document.getElementById('teacherName').value = '';
        document.getElementById('teacherEmail').value = '';
        document.getElementById('teacherPassword').value = '';
        document.getElementById('teacherRole').value = 'teacher';
        
        closeModal('teacherModal');
        await loadTeachers();
        showToast(`Teacher ${name} created!`);
    } catch (error) {
        showToast('Error: ' + error.message, 'error');
    }
}

// Delete Functions
async function deleteNote(id) { 
    if (confirm('Delete this note?')) { 
        await api(`daily_notes?id=eq.${id}`, { method: 'DELETE' }); 
        await loadAllData(); 
        showToast('Note deleted'); 
    } 
}

async function deleteQuestion(id) { 
    if (confirm('Delete this question?')) { 
        await api(`questions?id=eq.${id}`, { method: 'DELETE' }); 
        await loadAllData(); 
        showToast('Question deleted'); 
    } 
}

async function deleteBook(id) { 
    if (confirm('Delete this book?')) { 
        await api(`books?id=eq.${id}`, { method: 'DELETE' }); 
        await loadAllData(); 
        showToast('Book deleted'); 
    } 
}

async function deleteTeacher(id) {
    if (!confirm('Delete this teacher?')) return;
    await api(`teachers?id=eq.${id}`, { method: 'DELETE' });
    await loadTeachers();
    showToast('Teacher deleted');
}

// UI Functions
function showPage(page) {
    document.querySelectorAll('.page').forEach(p => p.style.display = 'none');
    document.getElementById(page).style.display = 'block';
    document.querySelectorAll('.nav-btn').forEach(btn => btn.classList.remove('active'));
    event.target.classList.add('active');
}

function openNoteModal() { 
    document.getElementById('noteDate').value = new Date().toISOString().split('T')[0];
    document.getElementById('noteTitle').value = '';
    document.getElementById('noteContent').value = '';
    document.getElementById('noteModal').style.display = 'flex'; 
}

function openQuestionModal() { 
    document.getElementById('questionText').value = '';
    document.getElementById('questionAnswer').value = '';
    document.getElementById('questionModal').style.display = 'flex'; 
}

function openBookModal() { 
    document.getElementById('bookTitle').value = '';
    document.getElementById('bookAuthor').value = '';
    document.getElementById('bookModal').style.display = 'flex'; 
}

function openTeacherModal() { 
    document.getElementById('teacherName').value = '';
    document.getElementById('teacherEmail').value = '';
    document.getElementById('teacherPassword').value = '';
    document.getElementById('teacherRole').value = 'teacher';
    document.getElementById('teacherModal').style.display = 'flex'; 
}

function closeModal(id) { 
    document.getElementById(id).style.display = 'none'; 
}

function escapeHtml(str) { 
    if (!str) return ''; 
    return str.replace(/[&<>]/g, m => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;' }[m])); 
}
